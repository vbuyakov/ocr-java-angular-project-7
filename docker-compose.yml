name: orion-microcrm

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-microcrm}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-microcrm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orioncrm

  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    user: root
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APP_NAME:-microcrm}
      LOGGING_FILE_PATH: /var/log/app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-microcrm}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - back-logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/profile"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - orioncrm

  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    volumes:
      - front-logs:/var/log/caddy
    depends_on:
      back:
        condition: service_healthy
    networks:
      - orioncrm

  nginx:
    image: nginx:alpine
    volumes:
      - ./misc/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - back
      - front
    networks:
      - orioncrm

volumes:
  postgres-data:
    name: ${ELK_PROJECT:-ocr-ja7}-postgres-data
  nginx-logs:
    name: ${ELK_PROJECT:-ocr-ja7}-nginx-logs
  back-logs:
    name: ${ELK_PROJECT:-ocr-ja7}-back-logs
  front-logs:
    name: ${ELK_PROJECT:-ocr-ja7}-front-logs

networks:
  orioncrm:
    name: ${DOCKER_NETWORK:-orion-microcrm_network}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
