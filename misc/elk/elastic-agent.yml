    use_output: default
    logs: true
    metrics: true
    traces: true
    namespace: default
  features: {}
  protection:
    enabled: false
    uninstall_token_hash: rIuOBV6QAQFsUYWsouEfagy0qlzCtHONTSaTuYxjXPA=
    signing_key: >-
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEcaBkwmliqPRSQXGOnN1Itn18M0vqCc/fSJhHNdGjFgq7tWjJ3w1+E1bvd6z39fGvm7bCdzDQmdJINdnCSNpXBQ==
inputs:
  - id: logfile-system-f8dd3d24-3a68-471f-b5df-ba2796690952
    name: system-2
    revision: 1
    type: logfile
    use_output: default
    meta:
      package:
        name: system
        version: 2.4.0
    data_stream:
      namespace: default
    package_policy_id: f8dd3d24-3a68-471f-b5df-ba2796690952
    streams:
      - id: logfile-system.auth-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.auth
          type: logs
        condition: >-
          ${host.os_version} != "12 (bookworm)" and (${host.os_platform} !=
          "amzn" or ${host.os_version} != "2023") and (${host.os_platform} !=
          "sles" and startsWith(${host.os_version}, "15") == false)
        ignore_older: 72h
        paths:
          - /var/log/auth.log*
          - /var/log/secure*
        exclude_files:
          - \.gz$
        multiline:
          pattern: ^\s
          match: after
        tags:
          - system-auth
        allow_deprecated_use: true
        processors:
          - add_locale: null
          - rename:
              fields:
                - from: message
                  to: event.original
              ignore_missing: true
              fail_on_error: false
          - syslog:
              field: event.original
              ignore_missing: true
              ignore_failure: true
      - id: logfile-system.syslog-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.syslog
          type: logs
        condition: >-
          ${host.os_version} != "12 (bookworm)" and (${host.os_platform} !=
          "amzn" or ${host.os_version} != "2023") and (${host.os_platform} !=
          "sles" and startsWith(${host.os_version}, "15") == false)
        paths:
          - /var/log/messages*
          - /var/log/syslog*
          - /var/log/system*
        exclude_files:
          - \.gz$
        multiline:
          pattern: ^\s
          match: after
        processors:
          - add_locale: null
        allow_deprecated_use: true
        tags: null
        ignore_older: 72h
  - id: journald-system-f8dd3d24-3a68-471f-b5df-ba2796690952
    name: system-2
    revision: 1
    type: journald
    use_output: default
    meta:
      package:
        name: system
        version: 2.4.0
    data_stream:
      namespace: default
    package_policy_id: f8dd3d24-3a68-471f-b5df-ba2796690952
    streams:
      - id: journald-system.auth-f8dd3d24-3a68-471f-b5df-ba2796690952
        type: journald
        data_stream:
          dataset: system.auth
          type: logs
        facilities:
          - 4
          - 10
        condition: >-
          ${host.os_version} == "12 (bookworm)" or (${host.os_platform} ==
          "amzn" and ${host.os_version} == "2023") or (${host.os_platform} ==
          "sles" and startsWith(${host.os_version}, "15") == true)
        tags: null
      - id: journald-system.syslog-f8dd3d24-3a68-471f-b5df-ba2796690952
        type: journald
        data_stream:
          dataset: system.syslog
          type: logs
        facilities:
          - 0
          - 1
          - 2
          - 3
          - 5
          - 6
          - 7
          - 8
          - 9
          - 11
          - 12
          - 15
        condition: >-
          ${host.os_version} == "12 (bookworm)" or (${host.os_platform} ==
          "amzn" and ${host.os_version} == "2023") or (${host.os_platform} ==
          "sles" and startsWith(${host.os_version}, "15") == true)
        tags: null
  - id: winlog-system-f8dd3d24-3a68-471f-b5df-ba2796690952
    name: system-2
    revision: 1
    type: winlog
    use_output: default
    meta:
      package:
        name: system
        version: 2.4.0
    data_stream:
      namespace: default
    package_policy_id: f8dd3d24-3a68-471f-b5df-ba2796690952
    streams:
      - id: winlog-system.application-f8dd3d24-3a68-471f-b5df-ba2796690952
        name: Application
        data_stream:
          dataset: system.application
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
      - id: winlog-system.security-f8dd3d24-3a68-471f-b5df-ba2796690952
        name: Security
        data_stream:
          dataset: system.security
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
      - id: winlog-system.system-f8dd3d24-3a68-471f-b5df-ba2796690952
        name: System
        data_stream:
          dataset: system.system
          type: logs
        condition: '${host.platform} == ''windows'''
        ignore_older: 72h
  - id: system/metrics-system-f8dd3d24-3a68-471f-b5df-ba2796690952
    name: system-2
    revision: 1
    type: system/metrics
    use_output: default
    meta:
      package:
        name: system
        version: 2.4.0
    data_stream:
      namespace: default
    package_policy_id: f8dd3d24-3a68-471f-b5df-ba2796690952
    streams:
      - id: system/metrics-system.cpu-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.cpu
          type: metrics
        metricsets:
          - cpu
        cpu.metrics:
          - percentages
          - normalized_percentages
        period: 10s
      - id: system/metrics-system.diskio-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.diskio
          type: metrics
        metricsets:
          - diskio
        diskio.include_devices: null
        period: 10s
      - id: system/metrics-system.filesystem-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.filesystem
          type: metrics
        metricsets:
          - filesystem
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.filesystem.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.fsstat-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.fsstat
          type: metrics
        metricsets:
          - fsstat
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.fsstat.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.load-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.load
          type: metrics
        metricsets:
          - load
        condition: '${host.platform} != ''windows'''
        period: 10s
      - id: system/metrics-system.memory-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.memory
          type: metrics
        metricsets:
          - memory
        period: 10s
      - id: system/metrics-system.network-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.network
          type: metrics
        metricsets:
          - network
        period: 10s
        network.interfaces: null
      - id: system/metrics-system.process-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.process
          type: metrics
        metricsets:
          - process
        period: 10s
        process.include_top_n.by_cpu: 5
        process.include_top_n.by_memory: 5
        process.cmdline.cache.enabled: true
        process.cgroups.enabled: false
        process.include_cpu_ticks: false
        processes:
          - .*
      - id: >-
          system/metrics-system.process.summary-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.process.summary
          type: metrics
        metricsets:
          - process_summary
        period: 10s
      - id: >-
          system/metrics-system.socket_summary-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.socket_summary
          type: metrics
        metricsets:
          - socket_summary
        period: 10s
      - id: system/metrics-system.uptime-f8dd3d24-3a68-471f-b5df-ba2796690952
        data_stream:
          dataset: system.uptime
          type: metrics
        metricsets:
          - uptime
        period: 10s
  - id: logfile-nginx-628a087d-927e-41c5-9912-21ad36730566
    name: nginx-2
    revision: 1
    type: logfile
    use_output: default
    meta:
      package:
        name: nginx
        version: 3.0.0
    data_stream:
      namespace: default
    package_policy_id: 628a087d-927e-41c5-9912-21ad36730566
    streams:
      - id: logfile-nginx.access-628a087d-927e-41c5-9912-21ad36730566
        data_stream:
          dataset: nginx.access
          type: logs
        ignore_older: 72h
        paths:
          - /var/log/nginx/access.log*
        tags:
          - nginx-access
        exclude_files:
          - .gz$
        processors:
          - add_locale: null
      - id: logfile-nginx.error-628a087d-927e-41c5-9912-21ad36730566
        data_stream:
          dataset: nginx.error
          type: logs
        ignore_older: 72h
        paths:
          - /var/log/nginx/error.log*
        tags:
          - nginx-error
        exclude_files:
          - .gz$
        multiline:
          pattern: '^\d{4}\/\d{2}\/\d{2} '
          negate: true
          match: after
        processors:
          - add_locale: null
  - id: nginx/metrics-nginx-628a087d-927e-41c5-9912-21ad36730566
    name: nginx-2
    revision: 1
    type: nginx/metrics
    use_output: default
    meta:
      package:
        name: nginx
        version: 3.0.0
    data_stream:
      namespace: default
    package_policy_id: 628a087d-927e-41c5-9912-21ad36730566
    streams:
      - id: nginx/metrics-nginx.stubstatus-628a087d-927e-41c5-9912-21ad36730566
        data_stream:
          dataset: nginx.stubstatus
          type: metrics
        metricsets:
          - stubstatus
        hosts:
          - 'http://127.0.0.1:80'
        tags:
          - nginx-stubstatus
        period: 10s
        server_status_path: /nginx_status
