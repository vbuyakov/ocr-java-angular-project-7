# Filebeat - collect logs from orion-microcrm-nginx
# Reads from shared volume nginx-logs (no /var/lib/docker/containers needed)
#
# Prerequisite: start orion-microcrm app first so the nginx-logs volume exists:
#   docker compose up -d
# Then start ELK:
#   docker compose -f docker-compose-elk.yml up -d

filebeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: true
    reload.period: 50s

filebeat.modules:
  - module: nginx
    access:
      enabled: true
      var.paths: ["/var/log/nginx/access_http.log"]
    error:
      enabled: true
      var.paths: ["/var/log/nginx/error_http.log"]
    
output.logstash:
  enabled: true
  hosts: ["logstash:5044"]  