input {
 http {
    host => "0.0.0.0"
    port => ${LOGSTASH_HTTP_PORT} 
    ecs_compatibility => "disabled"
    user => ${LOGSTASH_HTTP_USER}
    password => ${LOGSTASH_HTTP_PASSWORD}
    
  }
}



filter {
    if [workflow_run] {
        mutate {
        add_field => { "workflow_run_id" => "%{[workflow_run][id]}-%{[workflow_run][run_attempt]}" }
        }
    }

    # workflow_run_id for workflow_job events (when workflow_run not present)
    if [workflow_job] and ![workflow_run_id] {
        mutate {
        add_field => { "workflow_run_id" => "%{[workflow_job][run_id]}-%{[workflow_job][run_attempt]}" }
        add_field => { "result" => "%{[workflow_job][conclusion]}" }
        add_field => { "branch" => "%{[workflow_job][head_branch]}" }
        add_field => { "status" => "%{[workflow_job][status]}" }
        }
    }

    # execution_time = updated_at - run_started_at (seconds)
    if [workflow_run][updated_at] and [workflow_run][run_started_at] {
        ruby {
        code => '
            wr = event.get("[workflow_run]")
            updated = Time.parse(wr["updated_at"])
            started = Time.parse(wr["run_started_at"])
            event.set("execution_time", (updated - started).to_i)
        '
        }
    }
    mutate {
      add_field => { "source" => "github_webhook" }
    }
}

output {
    stdout {
      codec => json
    }

    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "micro-crm-github-actions-%{+YYYY.MM.dd}" 
      action => "create"
      user => "elastic"
      password => "${ELASTICSEARCH_PASSWORD}"
    }
}