# Logstash pipeline: Filebeat -> parse -> Elasticsearch
# Index: ocr-ja7-logs-%{+YYYY.MM.dd}

input {
  beats {
    port => 5044
  }
}

filter {
  if [service][type] == "nginx" {
    # Parse nginx access logs using Grok
    #grok {
    #  match => { "message" => '%{IPORHOST:client_ip} - - \[%{HTTPDATE:updated-type}\] \\"%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}\\" %{NUMBER:http_status:int} %{NUMBER:bytes_sent:int} \\"%{URI:http_referer}\\" \\"%{GREEDYDATA:http_user_agent}\\" rt=%{NUMBER:request_time:float} urt=%{NUMBER:upstream_response_time:float}' }
    #}

    grok {
      match => { "message" => '%{IPORHOST:client_ip} - - \[%{HTTPDATE:updated-type}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:http_status:int} %{NUMBER:bytes_sent:int} "%{URI:http_referer}" "%{GREEDYDATA:http_user_agent}" rt=%{NUMBER:request_time:float} urt=%{NUMBER:upstream_response_time:float}'}
    }
    mutate {
      add_field => { "source" => "nginx" }
    }
  }
  # Filebeat autodiscover scopes to orion-microcrm only - no filter needed
  # Parse JSON logs (e.g. Spring Boot Logback JSON encoder)
  # if [message] =~ /^\{.*\}$/ {
  #   json {
  #     source => "message"
  #     skip_on_invalid_json => true
  #   }
  # }
}

output {
    stdout {
      codec => json
    }
    file {
      path => "/var/log/logstash/logstash_output.log"
    }
  
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      #TODO: Rename later
      index => "ocr-ja7-logs-%{+YYYY.MM.dd}" 
      action => "create"
      user => "elastic"
      password => "${ELASTICSEARCH_PASSWORD}"
    }
}
